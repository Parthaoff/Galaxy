<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Signal Transmission</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 255, 0.7);
            font-size: 1.2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 1;
            transition: opacity 2s ease-out;
            text-shadow: 0 0 10px cyan;
        }
    </style>
</head>
<body>

    <div id="ui-layer">Scanning Deep Space...</div>
    <canvas id="spaceCanvas"></canvas>

<script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    const uiLayer = document.getElementById('ui-layer');

    let width, height, cx, cy;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        cx = width / 2;
        cy = height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // Setup entities
    const stars = Array.from({ length: 800 }, () => ({
        x: (Math.random() - 0.5) * 3000,
        y: (Math.random() - 0.5) * 3000,
        z: Math.random() * 2000
    }));

    const symbols = ['тНЩ', 'тНЪ', 'тНе', 'тНО', 'тНж', 'тНм', 'тОИ', 'тОЗ', 'тОН', 'тОП', 'тОР', 'тОС', 'тл╖', 'тл╕', 'тмб', 'тмв', 'тнУ'];
    const floatingSymbols = [];

    // Animation state
    let frame = 0;
    let phase = 0; // 0: Space, 1: Signal incoming, 2: Alien Transformation
    let signalIntensity = 0;
    let warpSpeed = 1;

    function drawDeepSpace() {
        // Clear background with trail effect
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = `rgba(0, 1, 4, ${phase === 2 ? 0.15 : 0.4})`;
        ctx.fillRect(0, 0, width, height);

        // Draw stars (3D projection)
        ctx.globalCompositeOperation = phase === 2 ? 'lighter' : 'source-over';
        
        stars.forEach(s => {
            s.z -= warpSpeed;
            if (s.z <= 0) {
                s.x = (Math.random() - 0.5) * 3000;
                s.y = (Math.random() - 0.5) * 3000;
                s.z = 2000;
            }

            const sx = cx + (s.x / s.z) * cx;
            const sy = cy + (s.y / s.z) * cy;
            const size = Math.max(0.1, (1 - s.z / 2000) * 3);

            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);

            if (phase === 2) {
                // Stars turn into glowing neon streaks during the event
                const hue = (s.z + frame) % 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                
                // Draw stretch lines
                ctx.moveTo(sx, sy);
                const psx = cx + (s.x / (s.z + warpSpeed * 2)) * cx;
                const psy = cy + (s.y / (s.z + warpSpeed * 2)) * cy;
                ctx.lineTo(psx, psy);
                ctx.strokeStyle = ctx.fillStyle;
                ctx.lineWidth = size;
                ctx.stroke();
            } else {
                // Normal deep space stars
                const brightness = Math.floor((1 - s.z / 2000) * 255);
                ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness})`;
                ctx.shadowBlur = 0;
                ctx.fill();
            }
        });
    }

    function drawEnergyWaves() {
        ctx.save();
        ctx.translate(cx, cy);
        
        const pulse = Math.sin(frame * 0.08) * 0.5 + 0.5;

        // Concentric geometric shapes (Hexagons)
        for (let i = 0; i < 6; i++) {
            const radius = ((frame * 3 + i * 200) % (Math.max(width, height))) + 10;
            const alpha = 1 - (radius / Math.max(width, height));
            const hue = (180 + i * 40 - frame) % 360;
            
            ctx.beginPath();
            ctx.shadowBlur = 20 + pulse * 10;
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
            ctx.lineWidth = 2 + pulse * 4;

            const sides = 6;
            for (let j = 0; j <= sides; j++) {
                const angle = (j * Math.PI * 2) / sides + frame * 0.005 * (i % 2 === 0 ? 1 : -1);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                if (j === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // Invisible energy synchronized pulses (Sine Rings)
        for (let r = 100; r <= 300; r += 100) {
            ctx.beginPath();
            for (let a = 0; a <= Math.PI * 2 + 0.1; a += 0.05) {
                // Complex waveform math synchronized to the pulse
                const wave1 = Math.sin(a * 8 + frame * 0.1) * 15 * pulse;
                const wave2 = Math.cos(a * 12 - frame * 0.15) * 10;
                const finalRadius = r + wave1 + wave2;
                
                const x = Math.cos(a) * finalRadius;
                const y = Math.sin(a) * finalRadius;
                if (a === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `hsla(${(frame * 2) % 360}, 100%, 70%, 0.6)`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Central glowing core
        ctx.shadowBlur = 50 + pulse * 50;
        ctx.shadowColor = '#fff';
        ctx.fillStyle = `hsla(180, 100%, 90%, ${0.6 + pulse * 0.4})`;
        ctx.beginPath();
        ctx.arc(0, 0, 20 + pulse * 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function handleSymbols() {
        // Spawn symbols
        if (Math.random() < 0.3) {
            floatingSymbols.push({
                char: symbols[Math.floor(Math.random() * symbols.length)],
                angle: Math.random() * Math.PI * 2,
                dist: 40,
                speed: 4 + Math.random() * 8,
                life: 1,
                rot: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.1,
                hue: (Math.random() * 60 + 160 + frame % 100) % 360 // Cyans, blues, magentas
            });
        }

        ctx.save();
        ctx.translate(cx, cy);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalCompositeOperation = 'lighter';

        for (let i = floatingSymbols.length - 1; i >= 0; i--) {
            const s = floatingSymbols[i];
            s.dist += s.speed;
            s.life -= 0.008;
            s.rot += s.rotSpeed;

            if (s.life <= 0) {
                floatingSymbols.splice(i, 1);
                continue;
            }

            const size = 10 + s.dist * 0.05;
            ctx.font = `bold ${size}px sans-serif`;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${s.hue}, 100%, 60%)`;
            ctx.fillStyle = `hsla(${s.hue}, 100%, 80%, ${s.life})`;

            const x = Math.cos(s.angle) * s.dist;
            const y = Math.sin(s.angle) * s.dist;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(s.angle + Math.PI / 2 + s.rot);
            ctx.fillText(s.char, 0, 0);
            ctx.restore();
        }
        ctx.restore();
    }

    function animate() {
        frame++;

        // Timed sequence events
        if (frame === 180) {
            uiLayer.innerText = "ANOMALY DETECTED";
            uiLayer.style.color = "red";
            uiLayer.style.textShadow = "0 0 10px red";
        }
        
        if (frame === 300) {
            phase = 1;
            uiLayer.style.opacity = 0;
        }

        if (phase === 1) {
            signalIntensity += 0.01;
            warpSpeed += 0.2; // Accelerate stars
            if (signalIntensity >= 1.5) {
                phase = 2; // Trigger full transformation
            }
        }

        drawDeepSpace();

        if (phase === 2) {
            drawEnergyWaves();
            handleSymbols();
        }

        // Blinding flash transition
        if (phase === 1) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, signalIntensity - 0.5)})`;
            ctx.fillRect(0, 0, width, height);
        } else if (phase === 2 && signalIntensity > 0) {
            // Fade out flash
            signalIntensity -= 0.02;
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, signalIntensity)})`;
            ctx.fillRect(0, 0, width, height);
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
